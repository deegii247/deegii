<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Нэвтрэх — CMS Admin</title>
<link rel="stylesheet" href="shared.css">
<style>
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: var(--bg);
  }

  /* Grid background decoration */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 48px 48px;
    opacity: .3;
    pointer-events: none;
  }

  .login-box {
    position: relative;
    width: 380px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px;
    box-shadow: 0 24px 64px rgba(0,0,0,.5);
  }

  .login-logo {
    font-family: var(--mono);
    font-size: 13px;
    color: var(--accent);
    margin-bottom: 32px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .login-logo::before {
    content: '';
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0,255,136,.4); }
    50% { opacity: .5; box-shadow: 0 0 0 6px rgba(0,255,136,0); }
  }

  .login-box h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .login-box > p { font-size: 13px; color: var(--muted); margin-bottom: 28px; }

  .login-error {
    background: rgba(255,59,59,.1);
    border: 1px solid rgba(255,59,59,.3);
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--danger);
    margin-bottom: 16px;
    display: none;
  }

  .login-hint {
    margin-top: 16px;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    line-height: 1.8;
  }
  .login-hint code { color: var(--accent); font-family: var(--mono); }

  .back-link {
    display: block;
    margin-top: 14px;
    text-align: center;
    font-size: 12px;
    color: var(--muted);
    text-decoration: none;
    transition: color .15s;
  }
  .back-link:hover { color: var(--text); }
</style>
</head>
<body>

<div class="login-box">
  <div class="login-logo">CMS Admin Panel</div>
  <h2>Нэвтрэх</h2>
  <p>Admin эрхээр нэвтрэн орно уу</p>

  <div class="login-error" id="login-error">Нэвтрэх нэр эсвэл нууц үг буруу байна!</div>

  <div class="form-group">
    <label>НЭВТРЭХ НЭР</label>
    <input type="text" id="login-user" placeholder="admin" autocomplete="username" />
  </div>
  <div class="form-group">
    <label>НУУЦ ҮГ</label>
    <input type="password" id="login-pass" placeholder="••••••" autocomplete="current-password" />
  </div>

  <button class="btn btn-primary" style="width:100%" onclick="doLogin()">Нэвтрэх →</button>

  <p class="login-hint">
    Нэвтрэх нэр: <code>admin</code><br>
    Нууц үг: <code>admin123</code>
  </p>
  <a href="index.html" class="back-link">← Нүүр хуудас руу буцах</a>
</div>

<div class="toast" id="toast"></div>

<script src="shared.js"></script>
<script>
  // Redirect if already logged in
  if (Store.isLoggedIn()) {
    window.location.href = 'admin.html';
  }

  document.getElementById('login-pass').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  function doLogin() {
    const u = document.getElementById('login-user').value.trim();
    const p = document.getElementById('login-pass').value;
    const err = document.getElementById('login-error');

    if (u === 'admin' && p === 'admin123') {
      err.style.display = 'none';
      Store.login();
      showToast('✓ Амжилттай нэвтэрлээ');
      setTimeout(() => { window.location.href = 'admin.html'; }, 600);
    } else {
      err.style.display = 'block';
      document.getElementById('login-pass').value = '';
      document.getElementById('login-pass').focus();
    }
  }
</script>
</body>
</html>
